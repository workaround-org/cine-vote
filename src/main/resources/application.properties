# ---------------------------------------------------------------------------
# Database / Hibernate
# ---------------------------------------------------------------------------
# Dev & test use Quarkus Dev Services (auto-started PostgreSQL via Testcontainers),
# so no datasource URL is configured here.
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%prod.quarkus.hibernate-orm.database.generation=update

# ---------------------------------------------------------------------------
# OMDb REST client (movie search)
# ---------------------------------------------------------------------------
quarkus.rest-client.omdb.url=https://www.omdbapi.com
quarkus.rest-client.omdb.connect-timeout=3000
quarkus.rest-client.omdb.read-timeout=5000
# Provide the real key via env var OMDB_API_KEY in deployments. Never commit it.
cinevote.omdb.api-key=${OMDB_API_KEY:demo}

# ---------------------------------------------------------------------------
# Admin authentication (quarkus-security-jpa, form-based)
# ---------------------------------------------------------------------------
quarkus.http.auth.form.enabled=true
quarkus.http.auth.form.login-page=/login
quarkus.http.auth.form.error-page=/login?error=true
quarkus.http.auth.form.landing-page=/admin
# Session cookie encryption key (>= 32 chars). Dev/test use the placeholder below;
# production MUST supply SESSION_ENCRYPTION_KEY (no committed fallback) or startup fails.
quarkus.http.auth.session.encryption-key=dev-only-change-me-32chars-minimum!!
%prod.quarkus.http.auth.session.encryption-key=${SESSION_ENCRYPTION_KEY}

# Admin paths require role "admin".
quarkus.http.auth.policy.admin-policy.roles-allowed=admin
quarkus.http.auth.permission.admin.paths=/admin,/admin/*
quarkus.http.auth.permission.admin.policy=admin-policy

# Everything else is public (no login required).
quarkus.http.auth.permission.public.paths=/,/votings,/votings/*,/search,/login,/logout,/q/*
quarkus.http.auth.permission.public.policy=permit

# Bootstrap admin credentials (created at startup if no admin user exists).
# Dev/test use the defaults below; production MUST supply ADMIN_PASSWORD (no
# committed fallback) or startup fails.
cinevote.admin.bootstrap-username=${ADMIN_USERNAME:admin}
cinevote.admin.bootstrap-password=changeme
%prod.cinevote.admin.bootstrap-password=${ADMIN_PASSWORD}
