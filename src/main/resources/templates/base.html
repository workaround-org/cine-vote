<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{#insert title}cine-vote{/}</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        :root { --bg:#0f1117; --card:#1b1f2a; --accent:#4695EB; --gold:#be9100; --text:#e8e8ea; --muted:#9aa0ac; --border:#262b38; }
        * { box-sizing: border-box; }
        body { margin:0; background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif; }
        header { display:flex; justify-content:space-between; align-items:center; gap:1rem; padding:1rem 1.5rem; background:#12151d; border-bottom:1px solid var(--border); }
        header a { color:var(--accent); text-decoration:none; font-weight:600; }
        header .brand { font-size:1.25rem; color:var(--text); }
        header nav { display:flex; gap:1rem; }
        main { max-width:960px; margin:0 auto; padding:1.5rem; }
        h1,h2 { line-height:1.2; }
        a { color:var(--accent); }
        a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
        .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:1rem; margin-bottom:1rem; }
        a.cardlink { display:block; color:inherit; text-decoration:none; transition:border-color .15s; }
        a.cardlink:hover { border-color:var(--accent); }
        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:1rem; }
        .option { position:relative; background:var(--card); border:2px solid var(--border); border-radius:10px; overflow:hidden; display:flex; flex-direction:column; margin:0; transition:border-color .15s, transform .15s; }
        .option img { width:100%; aspect-ratio:2/3; height:auto; object-fit:cover; background:#0a0c11; display:block; }
        .option .body { padding:.6rem .7rem; display:flex; flex-direction:column; flex:1; }
        .option .title { font-weight:600; margin:0 0 .25rem; font-size:.95rem; }
        .option .stats { color:var(--muted); font-size:.8rem; }
        .votes { color:var(--gold); font-weight:700; font-size:.85rem; margin:.4rem 0 0; }
        .bar { height:6px; border-radius:3px; background:#0a0c11; overflow:hidden; margin-top:.35rem; }
        .bar span { display:block; height:100%; background:var(--gold); border-radius:3px; }
        .option.winner { border-color:var(--gold); }
        .winner-badge { position:absolute; top:.5rem; left:.5rem; background:var(--gold); color:#0f1117; padding:.2rem .55rem; border-radius:999px; font-size:.75rem; font-weight:700; }
        label.option { cursor:pointer; }
        label.option:hover { border-color:#3d465c; transform:translateY(-2px); }
        label.option input[type=checkbox] { position:absolute; opacity:0; pointer-events:none; }
        label.option .tick { position:absolute; top:.5rem; right:.5rem; width:1.6rem; height:1.6rem; border-radius:50%; background:rgba(10,12,17,.75); border:2px solid var(--muted); color:transparent; display:flex; align-items:center; justify-content:center; font-size:.95rem; transition:all .15s; }
        label.option:has(input:checked) { border-color:var(--accent); box-shadow:0 0 0 3px rgba(70,149,235,.25); }
        label.option:has(input:checked) .tick { background:var(--accent); border-color:var(--accent); color:#fff; }
        .submitbar { position:sticky; bottom:0; display:flex; align-items:center; justify-content:space-between; gap:1rem; margin-top:1rem; padding:.75rem 1rem; background:rgba(18,21,29,.92); backdrop-filter:blur(6px); border:1px solid var(--border); border-radius:10px; }
        .submitbar button[disabled] { opacity:.45; cursor:not-allowed; }
        .badge { display:inline-block; padding:.15rem .5rem; border-radius:999px; font-size:.75rem; font-weight:600; }
        .badge.open { background:#16331f; color:#5fd17e; }
        .badge.closed { background:#33161a; color:#e07a85; }
        input[type=text], textarea, input[type=password] { width:100%; padding:.5rem; border-radius:6px; border:1px solid #333a49; background:#0d0f15; color:var(--text); }
        button, .btn { background:var(--accent); color:#fff; border:none; padding:.55rem 1rem; border-radius:6px; font-weight:600; cursor:pointer; text-decoration:none; display:inline-block; transition:filter .15s; }
        button:hover, .btn:hover { filter:brightness(1.15); }
        button.danger { background:#b3434f; }
        label { display:block; margin:.5rem 0 .25rem; color:var(--muted); font-size:.85rem; }
        form.inline { display:inline; }
        .error { background:#33161a; color:#e07a85; padding:.6rem .8rem; border-radius:6px; margin-bottom:1rem; }
        .success { background:#16331f; color:#5fd17e; padding:.6rem .8rem; border-radius:6px; margin-bottom:1rem; }
        .muted { color:var(--muted); }
        ul.bare { list-style:none; padding:0; margin:0; }
        @media (prefers-reduced-motion: reduce) { * { transition:none !important; } }
    </style>
</head>
<body>
<header>
    <a class="brand" href="/">🎬 cine-vote</a>
    <nav>
        <a href="/">Votings</a>
        <a href="/admin">Admin</a>
    </nav>
</header>
<main>
    {#insert body}{/}
</main>
</body>
</html>
